# cam_sight.cfg - Klipper macros for Cam Sight
#
# Include in printer.cfg:
#   [include cam_sight.cfg]
#
# Requires [save_variables] - https://www.klipper3d.org/Config_Reference.html#save_variables

[gcode_macro ALIGN_EMERGENCY_STOP]
gcode:
    M117 EMERGENCY STOP - Cam Sight
    M112

# Apply saved Cam Sight offsets at toolchange (MOVE=0 - no surprise move).
# Call from your tool-load macro: APPLY_TOOL_OFFSET TOOL=1
[gcode_macro APPLY_TOOL_OFFSET]
gcode:
    {% set tool = params.TOOL | default(0) | int %}
    {% set sv = printer.save_variables.variables %}
    {% if tool == 0 %}
        SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0
        RESPOND MSG="T0 - gcode offset cleared"
    {% else %}
        {% set xk = "cam_sight_t" ~ tool ~ "_x" %}
        {% set yk = "cam_sight_t" ~ tool ~ "_y" %}
        {% if xk not in sv or yk not in sv %}
            { action_raise_error("cam_sight: no saved offset for T%d - run Save offsets in Cam Sight" % tool) }
        {% endif %}
        {% set ox = sv[xk] | float %}
        {% set oy = sv[yk] | float %}
        SET_GCODE_OFFSET X={ox} Y={oy} Z=0 MOVE=0
        RESPOND MSG="T{tool} offset: X{ox} Y{oy}"
    {% endif %}
